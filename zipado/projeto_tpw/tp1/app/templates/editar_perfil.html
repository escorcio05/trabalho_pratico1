{% extends "layout.html" %}
{% block content %}
<div class="container" style="margin-top: 50px; max-width: 600px;">
    <div style="background: #1a1a1a; padding: 40px; border-radius: 12px; border: 1px solid #333;">
        <h2 style="color: #f5c518; margin-bottom: 30px;">Editar Perfil</h2>

        <form method="POST">
            {% csrf_token %}

            <div class="form-group">
                <label style="color: #f5c518;">Nome de Utilizador:</label>
                <input type="text" name="username" value="{{ perfil_user.username }}" class="form-control" style="background: #222; color: white; border: 1px solid #444;" required>
            </div>

            <div class="row" style="margin-top: 15px;">
                <div class="col-md-6">
                    <label style="color: #f5c518;">Primeiro Nome:</label>
                    <input type="text" name="first_name" value="{{ perfil_user.first_name }}" class="form-control" style="background: #222; color: white; border: 1px solid #444;">
                </div>
                <div class="col-md-6">
                    <label style="color: #f5c518;">Último Nome:</label>
                    <input type="text" name="last_name" value="{{ perfil_user.last_name }}" class="form-control" style="background: #222; color: white; border: 1px solid #444;">
                </div>
            </div>

            <div class="form-group" style="margin-top: 15px;">
                <label style="color: #f5c518;">E-mail:</label>
                <input type="email" name="email" value="{{ perfil_user.email }}" class="form-control" style="background: #222; color: white; border: 1px solid #444;">
            </div>

            {% if not request.user.is_superuser %}
            <div class="form-group" style="margin-top: 15px;">
                <label style="color: #f5c518;">Nova Password:</label>
                <input type="password" name="password" class="form-control" placeholder="Deixa vazio para manter a atual" style="background: #222; color: white; border: 1px solid #444;">
            </div>
            {% endif %}

            <div style="display: flex; gap: 10px; margin-top: 30px;">
                <button type="submit" class="btn btn-warning" style="flex: 2; font-weight: bold;">Confirmar Edição</button>

                <a href="{% url 'perfil_detalhado' perfil_user.id %}" class="btn btn-default">Voltar</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
