{% extends "layout.html" %}
{% block content %}
<div class="container" style="margin-top: 50px; max-width: 500px;">
    <div style="background: #1a1a1a; padding: 30px; border-radius: 12px; border: 1px solid #333;">
        <h3 style="color: #f5c518; margin-bottom: 25px;">{{ titulo }}</h3>
        <form method="POST">
            {% csrf_token %}
            <div class="form-group">
                <label style="color: #f5c518;">Nome:</label>
                <input type="text" name="nome" value="{{ item.nome }}" class="form-control" style="background: #222; color: white; border: 1px solid #444;" required>
            </div>
            <div style="display: flex; gap: 10px; margin-top: 30px;">
                <button type="submit" class="btn btn-warning" style="flex: 2; font-weight: bold;">Confirmar</button>
                <a href="{% url url_back %}" class="btn btn-default" style="flex: 1; background: #333; color: white; border: none;">Voltar</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
