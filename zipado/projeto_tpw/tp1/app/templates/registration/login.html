{% extends "layout.html" %}

{% block content %}
<div class="movie-card" style="max-width: 400px; margin: 50px auto;">
    <h2 class="section-title">Login - MOVIEZ</h2>

    <form method="post">
        {% csrf_token %}

        {{ form.as_p }}

        <button type="submit" class="btn btn-warning btn-block">Entrar</button>
    </form>

    <p style="font-family: sans-serif; font-size: 14px; margin-top: 15px; text-align: center;">
        Não tem conta?
        <a href="{% url 'registo' %}" style="color: #f5c518; text-decoration: none; font-weight: bold;">
            Registe-se aqui
        </a>
    </p>
</div>
{% endblock %}
